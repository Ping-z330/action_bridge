<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">ActionBridge Feishu and Agent preview</title>
  <desc id="desc">A simplified preview of Feishu card responses and Agent trace flow.</desc>
  <rect width="960" height="540" fill="#f6f7fb"/>
  <rect x="70" y="58" width="360" height="424" rx="22" fill="#ffffff" stroke="#dde3ee"/>
  <text x="104" y="108" fill="#172033" font-family="Arial, sans-serif" font-size="28" font-weight="700">Feishu Card</text>
  <rect x="104" y="138" width="286" height="50" rx="12" fill="#eef7ff"/>
  <text x="126" y="170" fill="#1c5fb8" font-family="Arial, sans-serif" font-size="17" font-weight="700">Meeting Summary Sent</text>
  <rect x="104" y="222" width="286" height="42" rx="10" fill="#f8fafc" stroke="#e1e8f0"/>
  <rect x="104" y="284" width="286" height="42" rx="10" fill="#f8fafc" stroke="#e1e8f0"/>
  <rect x="104" y="346" width="140" height="38" rx="10" fill="#118a55"/>
  <text x="136" y="370" fill="#ffffff" font-family="Arial, sans-serif" font-size="15" font-weight="700">Done</text>
  <rect x="492" y="58" width="398" height="424" rx="22" fill="#172033"/>
  <text x="528" y="108" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" font-weight="700">Agent Trace</text>
  <rect x="528" y="148" width="300" height="42" rx="10" fill="#26324a"/>
  <text x="550" y="174" fill="#c7d2e2" font-family="Arial, sans-serif" font-size="15">1. Normalize message</text>
  <rect x="528" y="212" width="300" height="42" rx="10" fill="#26324a"/>
  <text x="550" y="238" fill="#c7d2e2" font-family="Arial, sans-serif" font-size="15">2. Detect intent</text>
  <rect x="528" y="276" width="300" height="42" rx="10" fill="#26324a"/>
  <text x="550" y="302" fill="#c7d2e2" font-family="Arial, sans-serif" font-size="15">3. Route tool</text>
  <rect x="528" y="340" width="300" height="42" rx="10" fill="#26324a"/>
  <text x="550" y="366" fill="#c7d2e2" font-family="Arial, sans-serif" font-size="15">4. Build response</text>
  <path d="M430 270 C470 270 470 270 492 270" fill="none" stroke="#2f80ed" stroke-width="6" stroke-linecap="round"/>
</svg>
